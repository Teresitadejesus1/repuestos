<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VigaHome · Clientes sin repuesto</title>
<style>
:root {
  --blue:#185FA5;--blue-l:#E6F1FB;--blue-m:#378ADD;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --green:#0F6E56;--green-l:#EAF3DE;
  --red:#A32D2D;--red-l:#FCEBEB;
  --purple:#534AB7;--orange:#993C1D;
  --bg:#F7F8FA;--card:#FFFFFF;--border:#E2E5EA;
  --text:#1A1F2E;--text2:#5A6070;--text3:#9AA0AD;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:1.5rem 1rem;position:sticky;top:0;height:100vh;overflow-y:auto;}
.main{padding:2rem;max-width:1100px;}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:2rem;padding:0 .5rem;}
.logo-icon{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;flex-shrink:0;}
.logo-text{font-size:14px;font-weight:600;}
.nav-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:0 .5rem;margin-bottom:.5rem;margin-top:1.25rem;}
.nb{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text2);text-align:left;transition:all .15s;}
.nb:hover{background:var(--bg);color:var(--text);}
.nb.on{background:var(--blue-l);color:var(--blue);font-weight:500;}
.ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sync-btn{width:100%;margin-top:2rem;padding:9px;border-radius:var(--rs);background:var(--blue);color:white;border:none;font-size:13px;font-weight:500;cursor:pointer;}
.sync-btn:hover{background:#0C447C;}
.sync-btn:disabled{opacity:.6;cursor:not-allowed;}
.last-sync{font-size:11px;color:var(--text3);text-align:center;margin-top:.5rem;}
.page-header{margin-bottom:1.5rem;}
.page-title{font-size:22px;font-weight:600;}
.page-sub{font-size:13px;color:var(--text2);margin-top:3px;}
.alert{border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;font-size:13px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:.875rem;}
.ct{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.875rem;}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:.875rem;}
.m{background:var(--bg);border-radius:var(--rs);padding:.875rem 1rem;}
.ml{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.mv{font-size:24px;font-weight:600;color:var(--text);line-height:1;}
.ms{font-size:11px;color:var(--text3);margin-top:4px;}
.fr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.fr:last-child{border-bottom:none;}
.fl{font-size:12px;color:var(--text2);min-width:165px;}
.fb{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;}
.ff{height:100%;border-radius:4px;transition:width .5s ease;}
.fn{font-size:12px;font-weight:600;min-width:42px;text-align:right;}
.ct-table{width:100%;border-collapse:collapse;font-size:13px;}
.ct-table th{text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--border);}
.ct-table td{padding:9px 8px;border-bottom:1px solid var(--border);}
.ct-table tr:last-child td{border-bottom:none;}
.ct-table tfoot td{background:var(--bg);font-weight:600;}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.pg{background:var(--green-l);color:#1D5C46;}
.pa{background:var(--amber-l);color:#7A4A0E;}
.pr{background:var(--red-l);color:#6B1818;}
.br{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.br:last-child{border-bottom:none;}
.bn{flex:2;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.bb{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden;}
.bf{height:100%;border-radius:3px;}
.bm{font-size:11px;color:var(--text3);min-width:80px;text-align:right;}
.bc{font-weight:600;min-width:36px;text-align:right;}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.slider-row label{font-size:12px;color:var(--text2);min-width:130px;}
input[type=range]{flex:1;accent-color:var(--blue);}
.spct{font-size:14px;font-weight:600;min-width:36px;text-align:right;color:var(--blue);}
.insight{border-radius:var(--rs);padding:10px 14px;display:flex;gap:10px;align-items:flex-start;margin-top:.75rem;font-size:13px;}
.ib{background:var(--blue-l);color:#0D3D6B;}
.io{background:#FAECE7;color:#4D1A0A;}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* SEMAFORO */
.sem-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:.875rem;}
.sem-card{border-radius:var(--rs);padding:1rem;text-align:center;}
.sem-red{background:#FFF0F0;border:1px solid #FFC9C9;}
.sem-amber{background:#FFF8EC;border:1px solid #FFD990;}
.sem-green{background:#F0FAF5;border:1px solid #A3DFC0;}
.sem-num{font-size:32px;font-weight:700;line-height:1;}
.sem-label{font-size:12px;margin-top:4px;font-weight:500;}
.sem-sub{font-size:11px;color:var(--text3);margin-top:2px;}
/* FORECAST */
.fc-row{display:grid;grid-template-columns:60px 1fr 80px 90px;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.fc-row:last-child{border-bottom:none;}
.fc-bar-bg{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.fc-bar-fill{height:100%;border-radius:3px;background:var(--blue);}
/* TOP CLIENTES */
.top-table{width:100%;border-collapse:collapse;font-size:12px;}
.top-table th{text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:1px solid var(--border);}
.top-table td{padding:8px;border-bottom:1px solid var(--border);}
.top-table tr:last-child td{border-bottom:none;}
.top-table tr:hover td{background:var(--bg);}
.export-btn{padding:7px 14px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:500;cursor:pointer;color:var(--text);}
.export-btn:hover{background:var(--blue-l);color:var(--blue);border-color:var(--blue);}
@media(max-width:700px){.app{grid-template-columns:1fr;}.sidebar{height:auto;position:static;}.main{padding:1rem;}}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:.875rem;}
.comp-card{border-radius:var(--r);padding:1.25rem;border:2px solid var(--border);}
.comp-card.destacado{border-color:var(--blue);background:var(--blue-l);}
.comp-badge{display:inline-block;background:var(--blue);color:white;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:.75rem;}
.comp-precio{font-size:32px;font-weight:700;color:var(--text);line-height:1;}
.comp-periodo{font-size:13px;color:var(--text3);margin-top:2px;}
.comp-ahorro{background:#EAF3DE;border-radius:var(--rs);padding:8px 12px;margin:10px 0;font-size:13px;color:#1D5C46;font-weight:500;}
.comp-feature{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:var(--text2);}
.comp-feature.ok{color:var(--text);}
.check{color:var(--green);font-weight:700;}
.cross{color:var(--text3);}
.mrr-bar{height:10px;background:var(--bg);border-radius:5px;overflow:hidden;margin-top:4px;}
.mrr-fill{height:100%;border-radius:5px;background:var(--blue);transition:width .3s;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">vh</div>
      <span class="logo-text">VigaHome</span>
    </div>
    <div class="nav-label">Producto</div>
    <button class="nb on" onclick="setProd('osmosis',this)"><span class="ndot" style="background:var(--blue);"></span>Ósmosis inversa</button>
    <button class="nb" onclick="setProd('ablandador',this)"><span class="ndot" style="background:var(--purple);"></span>Ablandador</button>
    <button class="nb" onclick="setProd('pack_triple',this)"><span class="ndot" style="background:var(--orange);"></span>Pack triple</button>
    <div class="nav-label">Vista</div>
    <button class="nb on" id="nv-resumen" onclick="setVista('resumen',this)">Resumen</button>
    <button class="nb" id="nv-cohorts" onclick="setVista('cohorts',this)">Por año</button>
    <button class="nb" id="nv-repuestos" onclick="setVista('repuestos',this)">Repuestos</button>
    <button class="nb" id="nv-potencial" onclick="setVista('potencial',this)">Potencial $</button>
    <button class="nb" id="nv-semaforo" onclick="setVista('semaforo',this)">🚦 Urgencia</button>
    <button class="nb" id="nv-forecast" onclick="setVista('forecast',this)">📈 Forecast</button>
    <button class="nb" id="nv-top" onclick="setVista('top',this)">⭐ Top clientes</button>
    <div id="nv-sus-wrap"><button class="nb" id="nv-suscripcion" onclick="setVista('suscripcion',this)">💳 Suscripción</button></div>
    <button class="sync-btn" id="sync-btn" onclick="loadData()">↻ Sincronizar</button>
    <p class="last-sync" id="last-sync">No sincronizado</p>
  </aside>

  <main class="main">
    <div id="loading"><div class="spinner"></div><p style="font-size:13px;color:var(--text2);">Cargando datos...</p></div>
    <div id="content" style="display:none;"></div>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://vwkbpmnoiryibcrdjsxi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3a2JwbW5vaXJ5aWJjcmRqc3hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1Mzk4MzksImV4cCI6MjA5NzExNTgzOX0.HnIy-VXu25V5P5zmUEONppKPV8rgOCvbidOScvEV85w';

let curProd = 'osmosis';
let curVista = 'resumen';
let DATA = {};

const CFG = {
  osmosis:    {label:'Ósmosis inversa', color:'#185FA5', alertBg:'#FAEEDA', alertTxt:'#6B4010', sinLabel:'sin repuesto', rec:8},
  ablandador: {label:'Ablandador',      color:'#534AB7', alertBg:'#FCEBEB', alertTxt:'#5C1515', sinLabel:'sin mantención', rec:12},
  pack_triple:{label:'Pack triple',     color:'#993C1D', alertBg:'#FAECE7', alertTxt:'#4D1A0A', sinLabel:'sin repuesto', rec:8},
};

async function sbFetch(table) {
  let all=[], from=0;
  while(true){
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*&limit=1000&offset=${from}`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    if(!res.ok) throw new Error(`${res.status}`);
    const rows = await res.json();
    all = all.concat(rows);
    if(rows.length < 1000) break;
    from += 1000;
  }
  return all;
}

async function loadData(){
  const btn=document.getElementById('sync-btn');
  btn.disabled=true; btn.textContent='↻ Cargando...';
  document.getElementById('loading').style.display='flex';
  document.getElementById('content').style.display='none';
  try {
    const [eq, rep] = await Promise.all([sbFetch('equipos'), sbFetch('repuestos')]);
    DATA.eq=eq; DATA.rep=rep;
    DATA.computed = computeAll(eq, rep);
    document.getElementById('last-sync').textContent='Actualizado '+new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
    renderVista();
  } catch(e) {
    document.getElementById('loading').querySelector('p').textContent='Error: '+e.message;
  } finally {
    btn.disabled=false; btn.textContent='↻ Sincronizar';
  }
}

function computeAll(eq, rep){
  const res={};
  ['osmosis','ablandador','pack_triple'].forEach(prod=>{
    const eqP = eq.filter(r=>r.producto===prod);
    const repP = rep.filter(r=>r.producto_padre===prod);
    const eqEmails = new Set(eqP.map(r=>r.email_clean));
    const repEmails = new Set(repP.map(r=>r.email_clean));
    const conSet = new Set([...eqEmails].filter(e=>repEmails.has(e)));
    const sinSet = new Set([...eqEmails].filter(e=>!repEmails.has(e)));

    // Cohortes
    const years=[...new Set(eqP.map(r=>r.year))].sort();
    const cohorts=years.map(yr=>{
      const sub=new Set(eqP.filter(r=>r.year===yr).map(r=>r.email_clean));
      return {yr, total:sub.size, con:[...sub].filter(e=>repEmails.has(e)).length, sin:[...sub].filter(e=>!repEmails.has(e)).length};
    });

    // Tickets
    const tickets=repP.map(r=>+r.total_venta).filter(v=>v>0).sort((a,b)=>a-b);
    const med=tickets.length?tickets[Math.floor(tickets.length/2)]:0;
    const prom=tickets.length?tickets.reduce((a,b)=>a+b,0)/tickets.length:0;

    // Top repuestos
    const rc={};
    repP.forEach(r=>{rc[r.repuesto_nombre]=(rc[r.repuesto_nombre]||0)+1;});
    const topRep=Object.entries(rc).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([n,c])=>({n,c}));

    // Tiempo primer repuesto
    const eqFirst={}, repFirst={};
    eqP.forEach(r=>{if(!eqFirst[r.email_clean]||r.fecha<eqFirst[r.email_clean]) eqFirst[r.email_clean]=r.fecha;});
    repP.forEach(r=>{if(!repFirst[r.email_clean]||r.fecha<repFirst[r.email_clean]) repFirst[r.email_clean]=r.fecha;});
    const dias=[];
    Object.keys(eqFirst).forEach(em=>{
      if(repFirst[em]){const d=(new Date(repFirst[em])-new Date(eqFirst[em]))/86400000; if(d>=1) dias.push(d);}
    });
    dias.sort((a,b)=>a-b);
    const mediaDias=dias.length?dias[Math.floor(dias.length/2)]:0;

    // SEMAFORO — clientes sin repuesto clasificados por antigüedad
    const hoy = new Date();
    const semaforo = {rojo:[], amarillo:[], verde:[]};
    const topDormidos = [];

    sinSet.forEach(email=>{
      const compras = eqP.filter(r=>r.email_clean===email);
      const ultimaFecha = compras.map(r=>r.fecha).sort().pop();
      const meses = (hoy - new Date(ultimaFecha)) / (1000*60*60*24*30);
      const totalGastado = compras.reduce((s,r)=>s+(+r.total_venta||0),0);
      const nombre = compras[0]?.nombre || email;
      const ciudad = compras[0]?.ciudad || '';
      const productoNombre = compras[0]?.producto_nombre || '';
      const obj = {email, nombre, ultimaFecha, meses: Math.round(meses*10)/10, totalGastado, ciudad, productoNombre};
      if(meses > 18) semaforo.rojo.push(obj);
      else if(meses > 12) semaforo.amarillo.push(obj);
      else semaforo.verde.push(obj);
      topDormidos.push(obj);
    });

    topDormidos.sort((a,b)=>b.totalGastado-a.totalGastado);

    res[prod]={
      total:eqEmails.size, con:conSet.size, sin:sinSet.size,
      cohorts, ticketMed:med, ticketProm:prom, topRep,
      tiempoMeses:Math.round(mediaDias/30*10)/10,
      semaforo, topDormidos: topDormidos.slice(0,20)
    };
  });
  return res;
}

function f(n){return Math.round(n).toLocaleString('es-CL');}
function mm(n){return 'MM$'+(Math.round(n/100000)/10).toLocaleString('es-CL');}

function renderVista(){
  document.getElementById('loading').style.display='none';
  const el=document.getElementById('content');
  el.style.display='block';
  const d=DATA.computed[curProd];
  const cfg=CFG[curProd];
  const pctSin=Math.round(d.sin/d.total*100);
  const pctCon=Math.round(d.con/d.total*100);

  let html=`<div class="page-header">
    <p class="page-title">${cfg.label} — clientes sin repuesto</p>
    <p class="page-sub">Datos reales · ${DATA.eq.length+DATA.rep.length} registros</p>
  </div>
  <div class="alert" style="background:${cfg.alertBg};color:${cfg.alertTxt};">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span><strong>${f(d.sin)} clientes</strong> ${cfg.sinLabel} — <strong>${pctSin}%</strong> de la base.</span>
  </div>`;

  if(curVista==='resumen') html+=renderResumen(d,cfg,pctCon,pctSin);
  if(curVista==='cohorts') html+=renderCohorts(d,cfg);
  if(curVista==='repuestos') html+=renderRepuestos(d,cfg);
  if(curVista==='potencial') html+=renderPotencial(d,cfg);
  if(curVista==='semaforo') html+=renderSemaforo(d,cfg);
  if(curVista==='forecast') html+=renderForecast(d,cfg);
  if(curVista==='top') html+=renderTop(d,cfg);
  if(curVista==='suscripcion') html+=renderSuscripcion(d,cfg);

  el.innerHTML=html;
  setTimeout(()=>{ if(document.getElementById('sl-pct-r')) updPot(); if(document.getElementById('fc-wrap')) updFc(); if(document.getElementById('sus-wrap')) updSus(); },50);
}

function renderResumen(d,cfg,pctCon,pctSin){
  const bars=d.cohorts.map((c,i)=>{
    const cols=['#85B7EB','#378ADD','#185FA5','#0C447C'];
    const pct=Math.round(c.total/Math.max(...d.cohorts.map(x=>x.total))*100);
    return `<div class="br"><span class="bn" style="font-weight:600;">${c.yr}</span><div class="bb"><div class="bf" style="width:${pct}%;background:${cols[i]||cfg.color};"></div></div><span class="bc">${f(c.total)}</span></div>`;
  }).join('');
  return `<div class="mg">
    <div class="m"><div class="ml">Equipos vendidos</div><div class="mv" style="color:${cfg.color};">${f(d.total)}</div></div>
    <div class="m"><div class="ml">Sin repuesto</div><div class="mv" style="color:var(--amber);">${f(d.sin)}</div><div class="ms">${pctSin}% de la base</div></div>
    <div class="m"><div class="ml">Con repuesto</div><div class="mv" style="color:var(--green);">${f(d.con)}</div><div class="ms">${pctCon}% de la base</div></div>
    <div class="m"><div class="ml">1er repuesto</div><div class="mv">${d.tiempoMeses} m</div><div class="ms">mediana</div></div>
  </div>
  <div class="card"><p class="ct">Embudo de retención</p>
    <div class="fr"><span class="fl">Compraron equipo</span><div class="fb"><div class="ff" style="width:100%;background:${cfg.color};"></div></div><span class="fn">${f(d.total)}</span></div>
    <div class="fr"><span class="fl">Con al menos 1 repuesto</span><div class="fb"><div class="ff" style="width:${pctCon}%;background:#378ADD;"></div></div><span class="fn" style="color:var(--green);">${f(d.con)}</span></div>
    <div class="fr"><span class="fl" style="color:var(--amber);font-weight:600;">Sin ningún repuesto</span><div class="fb"><div class="ff" style="width:${pctSin}%;background:#EF9F27;"></div></div><span class="fn" style="color:var(--amber);">${f(d.sin)}</span></div>
  </div>
  <div class="card"><p class="ct">Clientes por año</p>${bars}</div>`;
}

function renderCohorts(d,cfg){
  const rows=d.cohorts.map(c=>{
    const t=Math.round(c.con/c.total*100);
    const pc=t>=35?'pg':t>=20?'pa':'pr';
    const pC=Math.round(c.con/c.total*100);
    return `<tr><td style="font-weight:600;">${c.yr}</td><td>${f(c.total)}</td><td style="color:var(--green);font-weight:500;">${f(c.con)}</td><td style="color:var(--amber);font-weight:500;">${f(c.sin)}</td><td><span class="pill ${pc}">${t}%</span></td></tr>`;
  }).join('');
  const tt=Math.round(d.con/d.total*100);
  const stacked=d.cohorts.map(c=>{
    const pC=Math.round(c.con/c.total*100);
    return `<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:var(--text2);">${c.yr}</span><span style="color:var(--green);font-weight:600;">${pC}% con repuesto</span></div>
    <div style="height:10px;background:var(--bg);border-radius:5px;overflow:hidden;display:flex;"><div style="width:${pC}%;height:100%;background:${cfg.color};border-radius:5px 0 0 5px;"></div><div style="width:${100-pC}%;height:100%;background:var(--amber-l);"></div></div></div>`;
  }).join('');
  return `<div class="card"><p class="ct">Retención por cohorte</p>

function updPot(){
  const wrap=document.getElementById('pot-wrap');
  if(!wrap) return;
  const sin=+wrap.dataset.sin;
  const med=+wrap.dataset.med;
  const prom=+wrap.dataset.prom;
  const color=wrap.dataset.color;

  const pct=+document.getElementById('sl-pct-r').value;
  const ticketTipo=document.getElementById('sl-ticket').value;
  const ticket=ticketTipo==='med'?med:prom;
  const rec=+document.getElementById('sl-rec').value;

  document.getElementById('sl-pct').textContent=pct+'%';
  document.getElementById('sl-rec-lbl').textContent=rec+' m';

  const c=Math.round(sin*pct/100);
  const primera=Math.round(c*ticket/100000)/10;
  const ciclosAnio=12/rec;
  const anual=Math.round(primera*ciclosAnio*10)/10;
  const tres=Math.round(primera*ciclosAnio*3*10)/10;

  document.getElementById('pot-c').textContent=f(c);
  document.getElementById('pot-m').textContent='MM$'+primera.toLocaleString('es-CL');
  document.getElementById('pot-anual-num').textContent='MM$'+anual.toLocaleString('es-CL');
  document.getElementById('pot-3y').textContent='MM$'+tres.toLocaleString('es-CL');
  document.getElementById('pot-insight').innerHTML=`<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <span style="margin-left:6px;">Recuperando <strong>${pct}% (${f(c)} clientes)</strong> con ticket $${f(ticket)} y recompra cada ${rec} meses → <strong>MM$${anual.toLocaleString('es-CL')}/año</strong> y <strong>MM$${tres.toLocaleString('es-CL')} en 3 años.</strong></span>`;

  // Escenarios dinámicos
  const pcts=[10,20,30,50,70];
  const maxP=Math.round(sin*70/100*ticket/100000)/10;
  document.getElementById('pot-esc').innerHTML=pcts.map(p=>{
    const cc=Math.round(sin*p/100);
    const v=Math.round(cc*ticket/100000)/10;
    const vAnual=Math.round(v*ciclosAnio*10)/10;
    const w=Math.round(v/maxP*100);
    const isActive=p===pct;
    return `<div style="margin-bottom:10px;${isActive?'background:var(--blue-l);border-radius:var(--rs);padding:4px 8px;margin-left:-8px;margin-right:-8px;':''}">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
        <span style="color:var(--text2);font-weight:${isActive?'600':'400'};">${p}% · ${f(cc)} clientes${isActive?' ← actual':''}</span>
        <span style="font-weight:600;">${mm(v)} · MM$${vAnual.toLocaleString('es-CL')}/año</span>
      </div>
      <div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;">
        <div style="width:${w}%;height:100%;background:${isActive?color:'#B5D4F4'};border-radius:4px;transition:width .3s;"></div>
      </div>
    </div>`;
  }).join('');
}

function updFc(){
  const wrap=document.getElementById('fc-wrap');
  if(!wrap) return;
  const sin=+wrap.dataset.sin;
  const med=+wrap.dataset.med;
  const prom=+wrap.dataset.prom;
  const color=wrap.dataset.color;
  const rec=+wrap.dataset.rec;

  const pct=+document.getElementById('fc-pct').value;
  const ticketTipo=document.getElementById('fc-ticket').value;
  const ticket=ticketTipo==='med'?med:prom;
  const mesesRec=+document.getElementById('fc-meses').value;

  document.getElementById('fc-pct-lbl').textContent=pct+'%';
  document.getElementById('fc-meses-lbl').textContent=mesesRec+' m';

  const totalCl=Math.round(sin*pct/100);
  const clPorMes=Math.round(totalCl/mesesRec);
  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const hoy=new Date();

  // Construir forecast: clientes nuevos + recompras
  const activos={}; // mes -> clientes activos acumulados
  let acum=0;
  const rows=[];

  for(let i=1;i<=12;i++){
    const fecha=new Date(hoy.getFullYear(),hoy.getMonth()+i,1);
    const label=meses[fecha.getMonth()]+' '+fecha.getFullYear().toString().slice(2);
    // Nuevos recuperados este mes
    const nuevos = i<=mesesRec ? clPorMes : 0;
    // Recompras: clientes que compraron hace exactamente rec meses
    const recompras = i>rec ? clPorMes : 0;
    const total_cl = nuevos + recompras;
    const ingreso = Math.round(total_cl * ticket);
    acum += ingreso;
    rows.push({label, nuevos, recompras, total_cl, ingreso, acum});
  }

  const maxIng=Math.max(...rows.map(r=>r.ingreso),1);
  const totalAnual=rows[rows.length-1].acum;
  const ingMes=Math.round(totalCl/mesesRec*ticket);

  document.getElementById('fc-metrics').innerHTML=`
    <div class="m"><div class="ml">Clientes a recuperar</div><div class="mv" style="color:${color};">${f(totalCl)}</div><div class="ms">${pct}% de ${f(sin)}</div></div>
    <div class="m"><div class="ml">Ingreso pico mensual</div><div class="mv" style="color:var(--green);">${mm(ingMes)}</div><div class="ms">${f(clPorMes)} cl/mes × $${f(ticket)}</div></div>
    <div class="m"><div class="ml">Total anual estimado</div><div class="mv" style="color:var(--green);">${mm(totalAnual)}</div><div class="ms">incluye recompras</div></div>
    <div class="m"><div class="ml">Recompras (mes ${rec+1}+)</div><div class="mv">${mm(Math.round(clPorMes*ticket))}</div><div class="ms">cada ${rec} meses</div></div>
  `;

  const barsHtml=rows.map(r=>`
    <div class="fc-row">
      <span style="font-size:12px;color:var(--text2);">${r.label}</span>
      <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
        <div class="fc-bar-bg"><div class="fc-bar-fill" style="width:${Math.round(r.nuevos*ticket/maxIng*100)}%;background:${color};"></div></div>
        ${r.recompras>0?`<div class="fc-bar-bg"><div class="fc-bar-fill" style="width:${Math.round(r.recompras*ticket/maxIng*100)}%;background:#85B7EB;"></div></div>`:''}
      </div>
      <span style="font-size:12px;font-weight:600;min-width:60px;text-align:right;">${mm(r.ingreso)}</span>
      <span style="font-size:11px;color:var(--text3);min-width:80px;text-align:right;">acum. ${mm(r.acum)}</span>
    </div>`).join('');

  document.getElementById('fc-bars').innerHTML=`<p class="ct">Forecast 12 meses</p>
    <div style="display:flex;gap:16px;margin-bottom:.75rem;font-size:11px;color:var(--text3);">
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:${color};display:inline-block;"></span>Nuevos recuperados</span>
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:#85B7EB;display:inline-block;"></span>Recompras</span>
    </div>
    ${barsHtml}`;

  document.getElementById('fc-insight').innerHTML=`<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <span style="margin-left:6px;">Recuperando <strong>${pct}% (${f(totalCl)} clientes)</strong> en ${mesesRec} meses con ticket ${ticketTipo==='med'?'mediana':'promedio'} de $${f(ticket)}, el forecast anual es <strong>${mm(totalAnual)}</strong>. Desde el mes ${rec+1} empiezan a entrar recompras adicionales.</span>`;
}

        <div class="comp-periodo">al año · pack anual completo</div>
        <div style="margin-top:1rem;">
          <div class="comp-feature ok"><span class="check">✓</span> Repuestos incluidos</div>
          <div class="comp-feature"><span class="cross">✗</span> Sin visita técnica</div>
          <div class="comp-feature"><span class="cross">✗</span> El cliente debe acordarse</div>
          <div class="comp-feature"><span class="cross">✗</span> Sin seguimiento de mantención</div>
        </div>
      </div>
      <div class="comp-card destacado">
        <span class="comp-badge">✦ SUSCRIPCIÓN</span>
        <div class="comp-precio" style="color:var(--blue);">$5.990</div>
        <div class="comp-periodo">al mes · $71.880 al año</div>
        <div class="comp-ahorro">💰 Ahorro de $28.110 al año (28% menos)</div>
        <div style="margin-top:.5rem;">
          <div class="comp-feature ok"><span class="check">✓</span> Repuestos incluidos</div>
          <div class="comp-feature ok"><span class="check">✓</span> Visita técnica incluida</div>
          <div class="comp-feature ok"><span class="check">✓</span> VigaHome se hace cargo</div>
          <div class="comp-feature ok"><span class="check">✓</span> Sin preocupaciones</div>
        </div>
      </div>
    </div>

    <!-- SIMULADOR MRR -->
    <div class="card">
      <p class="ct" style="margin-bottom:1rem;">Simulador de ingresos recurrentes (MRR)</p>

      <div class="slider-row">
        <label>% dormidos que suscriben</label>
        <input type="range" min="1" max="50" step="1" value="10" id="sus-pct" oninput="updSus()">
        <span class="spct" id="sus-pct-lbl">10%</span>
      </div>
      <div class="slider-row">
        <label>% base total que suscriben</label>
        <input type="range" min="1" max="30" step="1" value="5" id="sus-base-pct" oninput="updSus()">
        <span class="spct" id="sus-base-lbl">5%</span>
      </div>
      <div style="height:1px;background:var(--border);margin:12px 0;"></div>
      <div class="mg">
        <div class="m"><div class="ml">Suscritos (dormidos)</div><div class="mv" style="color:var(--blue);font-size:20px;" id="sus-cl-dorm">—</div><div class="ms" id="sus-cl-dorm-sub"></div></div>
        <div class="m"><div class="ml">Suscritos (base total)</div><div class="mv" style="color:var(--blue);font-size:20px;" id="sus-cl-base">—</div><div class="ms" id="sus-cl-base-sub"></div></div>
        <div class="m"><div class="ml">MRR total</div><div class="mv" style="color:var(--green);font-size:20px;" id="sus-mrr">—</div><div class="ms">mensual recurrente</div></div>
        <div class="m"><div class="ml">ARR (anual)</div><div class="mv" style="color:var(--green);font-size:20px;" id="sus-arr">—</div><div class="ms">ingreso anual recurrente</div></div>
      </div>
      <div style="margin-top:1rem;">
        <p style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">MRR según escenario</p>
        <div id="sus-esc"></div>
      </div>
      <div class="insight ib" id="sus-insight" style="margin-top:.75rem;"></div>
    </div>

    <!-- VS MODELO ACTUAL -->
    <div class="card">
      <p class="ct">Suscripción vs modelo actual</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="m">
          <div class="ml">Ingreso actual (30% recuperación)</div>
          <div class="mv" style="font-size:18px;">MM$${Math.round(d.sin*0.3*26990/100000*10)/10}</div>
          <div class="ms">compra única · ticket mediana</div>
        </div>
        <div class="m">
          <div class="ml">Con suscripción (10% dormidos)</div>
          <div class="mv" style="color:var(--green);font-size:18px;" id="sus-vs">—</div>
          <div class="ms">MRR × 12 meses</div>
        </div>
      </div>
      <div class="insight ib" style="margin-top:.75rem;">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span style="margin-left:6px;">La suscripción genera ingresos <strong>predecibles y recurrentes</strong> todos los meses — mucho más valioso que una venta única. Además fideliza al cliente y elimina la competencia de precio en repuestos.</span>
      </div>
    </div>
  </div>`;
}

function updSus(){
  const wrap=document.getElementById('sus-wrap');
  if(!wrap) return;
  const sin=+wrap.dataset.sin;
  const total=+wrap.dataset.total;

  const pctDorm=+document.getElementById('sus-pct').value;
  const pctBase=+document.getElementById('sus-base-pct').value;

  document.getElementById('sus-pct-lbl').textContent=pctDorm+'%';
  document.getElementById('sus-base-lbl').textContent=pctBase+'%';

  const clDorm=Math.round(sin*pctDorm/100);
  const clBase=Math.round(total*pctBase/100);
  const clTotal=clDorm+clBase;
  const mrr=clTotal*5990;
  const arr=mrr*12;

  document.getElementById('sus-cl-dorm').textContent=f(clDorm);
  document.getElementById('sus-cl-dorm-sub').textContent=pctDorm+'% de '+f(sin)+' dormidos';
  document.getElementById('sus-cl-base').textContent=f(clBase);
  document.getElementById('sus-cl-base-sub').textContent=pctBase+'% de '+f(total)+' activos';
  document.getElementById('sus-mrr').textContent=mm(mrr);
  document.getElementById('sus-arr').textContent=mm(arr);
  document.getElementById('sus-vs').textContent=mm(arr);

  // Escenarios
  const escenarios=[
    {label:'Conservador',pctD:5,pctB:2},
    {label:'Base',pctD:10,pctB:5},
    {label:'Optimista',pctD:20,pctB:10},
    {label:'Agresivo',pctD:35,pctB:15},
  ];
  const maxArr=Math.max(...escenarios.map(e=>(Math.round(sin*e.pctD/100)+Math.round(total*e.pctB/100))*5990*12));
  const isActive=(e)=>e.pctD===pctDorm&&e.pctB===pctBase;

  document.getElementById('sus-esc').innerHTML=escenarios.map(e=>{
    const cl=Math.round(sin*e.pctD/100)+Math.round(total*e.pctB/100);
    const eArr=cl*5990*12;
    const eMrr=cl*5990;
    const w=Math.round(eArr/maxArr*100);
    const active=Math.abs(e.pctD-pctDorm)<=2&&Math.abs(e.pctB-pctBase)<=2;
    return `<div style="margin-bottom:10px;${active?'background:var(--blue-l);border-radius:var(--rs);padding:4px 8px;margin-left:-8px;margin-right:-8px;':''}">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
        <span style="color:var(--text2);font-weight:${active?'600':'400'};">${e.label} — ${f(cl)} suscritos${active?' ← actual':''}</span>
        <span style="font-weight:600;">MRR ${mm(eMrr)} · ARR ${mm(eArr)}</span>
      </div>
      <div class="mrr-bar"><div class="mrr-fill" style="width:${w}%;background:${active?'var(--blue)':'#85B7EB'};"></div></div>
    </div>`;
  }).join('');

  document.getElementById('sus-insight').innerHTML=`<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <span style="margin-left:6px;">Con <strong>${f(clTotal)} suscritos</strong> (${pctDorm}% de dormidos + ${pctBase}% de base activa) → <strong>MRR de ${mm(mrr)}</strong> todos los meses, <strong>ARR de ${mm(arr)}</strong> al año.</span>`;
}
</script>
</body>
</html>
